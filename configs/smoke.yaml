# Tiny config for a fast end-to-end smoke test of the NS-3 bridge.
# Topology mirrors the canonical 4-path no-dominant scenario (configs/four_path.yaml
# / the hardcoded C++ ScenarioConfig) so a smoke run matches production shape.
topology:
  paths:
    - {rate: "3Mbps",   delay: "10ms", cross_frac: 0.40}
    - {rate: "3Mbps",   delay: "15ms", cross_frac: 0.45}
    - {rate: "2.5Mbps", delay: "40ms", cross_frac: 0.30}
    - {rate: "2Mbps",   delay: "20ms", cross_frac: 0.55}
video:
  fps: 30
  min_bitrate_kbps: 300
  max_bitrate_kbps: 6000
  init_bitrate_kbps: 1500
episode:
  seconds: 4
  app_period_s: 1.0
reward:
  a_quality: 1.0
  b_latency: 0.5
  c_jitter: 0.5
  d_loss: 1.0
sac:
  hidden_dim: 64
  batch_size: 64
  start_steps: 100
  update_after: 100
run:
  episodes: 2
  seed: 1
  cap_mbps: 12.0           # match the 4-path topology's throughput normalization
