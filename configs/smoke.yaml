# Tiny config for a fast end-to-end smoke test of the NS-3 bridge.
topology:
  paths:
    - {rate: "8Mbps", delay: "10ms", cross_frac: 0.45}
    - {rate: "4Mbps", delay: "17ms", cross_frac: 0.65}
    - {rate: "2Mbps", delay: "30ms", cross_frac: 0.35}
video:
  fps: 30
  min_bitrate_kbps: 300
  max_bitrate_kbps: 6000
  init_bitrate_kbps: 1500
episode:
  seconds: 4
  app_period_s: 1.0
reward:
  a_quality: 1.0
  b_latency: 0.5
  c_jitter: 0.5
  d_loss: 1.0
sac:
  hidden_dim: 64
  batch_size: 64
  start_steps: 100
  update_after: 100
run:
  episodes: 2
  seed: 1
